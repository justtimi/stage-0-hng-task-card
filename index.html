<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Todo Componnent – HNG Stage 0 Task</title>
  </head>
  <body>
    <main>
      <article data-testid="test-todo-card" aria-labelledby="task-title">
        <header>
          <h2 data-testid="test-todo-title" id="task-title">
            My first task for the HNG Internship
          </h2>

          <div class="action-btns">
            <button
              data-testid="test-todo-edit-button"
              class="edit-button"
              aria-label="Edit task"
            >
              Edit
            </button>
            <button
              data-testid="test-todo-delete-button"
              class="delete-button"
              aria-label="Delete task"
            >
              Delete
            </button>
          </div>
        </header>

        <p data-testid="test-todo-description">
          HNG Stage 0 task building a responsive Todo Card using HTML, CSS, and
          JavaScript with dynamic state and time updates.
        </p>

        <div class="badges">
          <span
            class="badge priority-high"
            data-testid="test-todo-priority"
            aria-label="Priority: High"
            >High</span
          >
          <span
            id="status"
            class="badge status-inprogress"
            data-testid="test-todo-status"
            aria-label="Status: In Progress"
            aria-live="polite"
            >In Progress</span
          >
        </div>
        <time datetime="2026-04-16T18:00:00Z" data-testid="test-todo-due-date"
          >Due April 16, 2026</time
        >
        <div
          data-testid="test-todo-time-remaining"
          aria-live="polite"
          class="time-remaining"
        ></div>

        <div data-testid="test-todo-tags">
          <ul class="tags" role="list">
            <li data-testid="test-todo-tag-work">work</li>
            <li data-testid="test-todo-tag-urgent">urgent</li>
            <li data-testid="test-todo-tag-design">design</li>
          </ul>
        </div>

        <div class="checkbox-container">
          <input
            data-testid="test-todo-complete-toggle"
            type="checkbox"
            name="complete"
            id="complete-toggle"
          />
          <label for="complete-toggle">Mark as complete</label>
        </div>
      </article>
    </main>
    <script src="script.js"></script>
  </body>
</html>
